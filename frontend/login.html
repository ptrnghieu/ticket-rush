<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — TicketRush</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8) var(--sp-4);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--sp-8);
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--sp-8);
    }
    .auth-logo {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--accent);
      display: block;
      margin-bottom: var(--sp-4);
    }
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }
    .auth-sub {
      font-size: var(--text-sm);
      color: var(--text-2);
      margin-top: var(--sp-1);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--sp-6);
      font-size: var(--text-sm);
      color: var(--text-2);
    }
    .auth-footer a {
      color: var(--accent);
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .form-error-banner {
      display: none;
      padding: var(--sp-3) var(--sp-4);
      background: var(--error-dim);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--error);
    }
    .form-error-banner.visible { display: block; }
    .password-wrap {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: var(--sp-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--sp-1);
      display: flex;
      transition: color var(--t);
    }
    .password-toggle:hover { color: var(--text-2); }
    .password-wrap .input { padding-right: 2.5rem; }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────────── -->
<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Ticket<span style="color:var(--text-1)">Rush</span></a>
    <nav class="nav-links">
      <div id="nav-auth" style="display:contents"></div>
    </nav>
  </div>
</header>

<!-- ── Auth page ────────────────────────────────────────────────── -->
<main class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <span class="auth-logo">TicketRush</span>
      <h1 class="auth-title">Đăng nhập</h1>
      <p class="auth-sub">Chào mừng trở lại! Vui lòng nhập thông tin tài khoản.</p>
    </div>

    <div class="form-error-banner" id="form-error" role="alert"></div>

    <form class="auth-form" id="login-form" novalidate>

      <div class="field">
        <label class="label" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
        <span class="field-error" id="email-error" role="alert"></span>
      </div>

      <div class="field">
        <label class="label" for="password">Mật khẩu</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            class="input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button
            type="button"
            class="password-toggle"
            id="toggle-password"
            aria-label="Hiện/ẩn mật khẩu"
          >
            <!-- eye icon -->
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="password-error" role="alert"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
        Đăng nhập
      </button>

    </form>

    <p class="auth-footer">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </p>

  </div>
</main>

<!-- ── Toast ────────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ──────────────────────────────────────────────────── -->
<script type="module">
import { login, isLoggedIn, renderNavAuth } from './js/auth.js';

renderNavAuth(document.getElementById('nav-auth'));

// ── Redirect if already logged in ──────────────────────────────
if (isLoggedIn()) {
  const redir = new URLSearchParams(window.location.search).get('redirect');
  window.location.replace(redir || 'index.html');
}

// ── DOM refs ────────────────────────────────────────────────────
const form        = document.getElementById('login-form');
const emailEl     = document.getElementById('email');
const passwordEl  = document.getElementById('password');
const submitBtn   = document.getElementById('submit-btn');
const formError   = document.getElementById('form-error');
const emailError  = document.getElementById('email-error');
const passwordErr = document.getElementById('password-error');
const toggleBtn   = document.getElementById('toggle-password');

// ── Password visibility toggle ──────────────────────────────────
toggleBtn.addEventListener('click', () => {
  const visible = passwordEl.type === 'text';
  passwordEl.type = visible ? 'password' : 'text';
  toggleBtn.setAttribute('aria-label', visible ? 'Hiện mật khẩu' : 'Ẩn mật khẩu');
});

// ── Clear field error on change ─────────────────────────────────
emailEl.addEventListener('input', () => setFieldError(emailEl, emailError, ''));
passwordEl.addEventListener('input', () => setFieldError(passwordEl, passwordErr, ''));

// ── Validation ──────────────────────────────────────────────────
function validate() {
  let valid = true;

  const email = emailEl.value.trim();
  if (!email) {
    setFieldError(emailEl, emailError, 'Email không được để trống.');
    valid = false;
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setFieldError(emailEl, emailError, 'Địa chỉ email không hợp lệ.');
    valid = false;
  } else {
    setFieldError(emailEl, emailError, '');
  }

  const password = passwordEl.value;
  if (!password) {
    setFieldError(passwordEl, passwordErr, 'Mật khẩu không được để trống.');
    valid = false;
  } else {
    setFieldError(passwordEl, passwordErr, '');
  }

  return valid;
}

function setFieldError(inputEl, errorEl, msg) {
  if (msg) {
    inputEl.classList.add('input-error');
    errorEl.textContent = msg;
  } else {
    inputEl.classList.remove('input-error');
    errorEl.textContent = '';
  }
}

function showFormError(msg) {
  formError.textContent = msg;
  formError.classList.add('visible');
}

function hideFormError() {
  formError.textContent = '';
  formError.classList.remove('visible');
}

// ── Submit ──────────────────────────────────────────────────────
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideFormError();

  if (!validate()) return;

  submitBtn.classList.add('btn-loading');
  submitBtn.disabled = true;

  try {
    await login(emailEl.value.trim(), passwordEl.value);

    const redir = new URLSearchParams(window.location.search).get('redirect');
    window.location.replace(redir || 'index.html');
  } catch (err) {
    showFormError(err.message || 'Đăng nhập thất bại. Vui lòng thử lại.');
  } finally {
    submitBtn.classList.remove('btn-loading');
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
