<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vé của tôi — TicketRush</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Page layout ─────────────────────────────────────────────── */
    .tickets-page {
      padding: var(--sp-8) 0 var(--sp-16);
    }
    .page-header {
      margin-bottom: var(--sp-8);
    }
    .page-header h1 {
      font-size: var(--text-3xl);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }
    .page-header p {
      color: var(--text-2);
      margin-top: var(--sp-2);
    }

    /* ── Event group ─────────────────────────────────────────────── */
    .event-group {
      margin-bottom: var(--sp-8);
    }
    .event-group__header {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-4) var(--sp-6);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-bottom: none;
    }
    .event-group__banner {
      width: 56px;
      height: 56px;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--bg-elevated);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
    }
    .event-group__banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .event-group__info {
      flex: 1;
      min-width: 0;
    }
    .event-group__name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-group__meta {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      margin-top: var(--sp-1);
      font-size: var(--text-sm);
      color: var(--text-2);
      flex-wrap: wrap;
    }
    .event-group__meta-item {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
    }
    .event-group__count {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ── Tickets grid ─────────────────────────────────────────────── */
    .tickets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      overflow: hidden;
    }
    .ticket-card {
      background: var(--bg-surface);
      padding: var(--sp-4) var(--sp-6);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--t);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
    }
    .ticket-card:hover {
      background: var(--bg-elevated);
    }
    .ticket-card:last-child {
      border-bottom: none;
    }

    /* Remove right border from last in each row — approximate with nth-child */
    .ticket-seat-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }
    .ticket-info {
      flex: 1;
      min-width: 0;
    }
    .ticket-label {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text-1);
    }
    .ticket-zone {
      font-size: var(--text-sm);
      color: var(--text-2);
      margin-top: 2px;
    }
    .ticket-status {
      flex-shrink: 0;
    }
    .ticket-qr-hint {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: var(--text-xs);
      color: var(--text-3);
      margin-top: var(--sp-1);
    }

    /* Status badges for tickets */
    .badge-active   { background: var(--success-dim); color: var(--success); }
    .badge-used     { background: rgba(144,144,160,.12); color: var(--text-3); }
    .badge-cancelled { background: var(--error-dim); color: var(--error); }

    /* ── QR Modal ────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,16,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: var(--sp-4);
    }
    .modal-backdrop.visible {
      display: flex;
    }
    .qr-modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--sp-8);
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    .qr-modal__close {
      position: absolute;
      top: var(--sp-4);
      right: var(--sp-4);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.125rem;
      line-height: 1;
      transition: all var(--t);
    }
    .qr-modal__close:hover {
      background: var(--bg-hover);
      color: var(--text-1);
    }
    .qr-modal__event {
      font-size: var(--text-sm);
      color: var(--text-2);
      margin-bottom: var(--sp-2);
    }
    .qr-modal__seat {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: var(--sp-6);
    }
    .qr-code-wrap {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: var(--sp-4);
      display: inline-block;
      margin-bottom: var(--sp-6);
    }
    .qr-code-wrap img {
      display: block;
      width: 200px;
      height: 200px;
      image-rendering: pixelated;
    }
    .qr-code-text {
      font-size: var(--text-xs);
      color: var(--text-3);
      font-family: monospace;
      word-break: break-all;
      margin-bottom: var(--sp-4);
    }
    .qr-modal__zone {
      font-size: var(--text-sm);
      color: var(--text-2);
      margin-bottom: var(--sp-4);
    }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    .skeleton-group {
      margin-bottom: var(--sp-8);
    }
    .skeleton-group-header {
      height: 80px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .skeleton-tickets {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      overflow: hidden;
    }
    .skeleton-ticket {
      height: 72px;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-ticket:last-child { border-bottom: none; }

    @media (max-width: 768px) {
      .tickets-grid { grid-template-columns: 1fr; }
      .event-group__banner { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────────────── -->
<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Ticket<span style="color:var(--text-1)">Rush</span></a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Sự kiện</a>
      <div id="nav-auth" style="display:contents"></div>
    </nav>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────── -->
<main class="tickets-page">
  <div class="container">

    <div class="page-header">
      <h1>Vé của tôi</h1>
      <p>Xem và quản lý tất cả vé đã đặt của bạn.</p>
    </div>

    <div id="tickets-content">
      <!-- Skeletons shown while loading -->
      <div id="tickets-skeleton">
        ${[1,2].map(() => `
          <div class="skeleton-group">
            <div class="skeleton skeleton-group-header"></div>
            <div class="skeleton-tickets">
              <div class="skeleton skeleton-ticket"></div>
              <div class="skeleton skeleton-ticket"></div>
              <div class="skeleton skeleton-ticket"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>

  </div>
</main>

<!-- ── QR Code Modal ─────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="qr-modal" role="dialog" aria-modal="true"
     aria-labelledby="qr-modal-seat" tabindex="-1">
  <div class="qr-modal">
    <button class="qr-modal__close" id="qr-close-btn" aria-label="Đóng">✕</button>
    <p class="qr-modal__event" id="qr-event-name"></p>
    <p class="qr-modal__seat" id="qr-seat-label"></p>
    <p class="qr-modal__zone" id="qr-zone-label"></p>
    <div class="qr-code-wrap">
      <img id="qr-image" src="" alt="QR Code vé" width="200" height="200">
    </div>
    <p class="qr-code-text" id="qr-code-text"></p>
    <div id="qr-status-badge"></div>
  </div>
</div>

<!-- ── Footer ──────────────────────────────────────────────────────── -->
<footer class="footer">
  <div class="container footer-inner">
    <span class="footer-logo">TicketRush</span>
    <span class="footer-copy">© 2026 TicketRush · INT3306 Spring 2026</span>
  </div>
</footer>

<!-- ── Toast ────────────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ──────────────────────────────────────────────────────── -->
<script type="module">
import { api }                        from './js/api.js';
import { requireAuth, renderNavAuth } from './js/auth.js';

// ── Auth guard ──────────────────────────────────────────────────────
renderNavAuth(document.getElementById('nav-auth'));
if (!requireAuth()) throw new Error('redirect');

// ── DOM refs ────────────────────────────────────────────────────────
const contentEl  = document.getElementById('tickets-content');
const skeletonEl = document.getElementById('tickets-skeleton');
const qrModal    = document.getElementById('qr-modal');
const qrCloseBtn = document.getElementById('qr-close-btn');

// ── Helpers ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('vi-VN', {
    weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

/**
 * Map ticket status to badge HTML.
 * @param {string} status
 * @returns {string}
 */
function statusBadge(status) {
  const map = {
    active:    { cls: 'badge-active',    label: 'Hợp lệ' },
    used:      { cls: 'badge-used',      label: 'Đã dùng' },
    cancelled: { cls: 'badge-cancelled', label: 'Đã huỷ' },
  };
  const { cls, label } = map[status] ?? { cls: 'badge-neutral', label: status };
  return `<span class="badge ${cls}">${label}</span>`;
}

/**
 * Group an array of tickets by event ID.
 * @param {object[]} tickets
 * @returns {Map<number, { event: object, tickets: object[] }>}
 */
function groupByEvent(tickets) {
  const groups = new Map();
  for (const t of tickets) {
    const key = t.eventId;
    if (!groups.has(key)) {
      groups.set(key, {
        event: {
          id:         t.eventId,
          title:      t.eventTitle,
          venue:      t.venue,
          eventDate:  t.eventDate,
          bannerUrl:  t.bannerUrl,
        },
        tickets: [],
      });
    }
    groups.get(key).tickets.push(t);
  }
  return groups;
}

// ── Render ───────────────────────────────────────────────────────────

/**
 * Render a single ticket card inside a group grid.
 * @param {object} ticket
 * @returns {string}
 */
function buildTicketCard(ticket) {
  return `
    <div class="ticket-card"
         data-ticket-id="${ticket.id}"
         role="button"
         tabindex="0"
         aria-label="Xem QR vé ghế ${escHtml(ticket.seatLabel ?? ticket.seatId)}">
      <div class="ticket-seat-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </div>
      <div class="ticket-info">
        <div class="ticket-label">Ghế ${escHtml(ticket.seatLabel ?? String(ticket.seatId))}</div>
        <div class="ticket-zone">${escHtml(ticket.zoneName ?? '—')}</div>
        <div class="ticket-qr-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <path d="M14 14h3v3"/><path d="M20 14v3h-3"/><path d="M20 20h.01"/>
          </svg>
          Nhấn để xem QR
        </div>
      </div>
      <div class="ticket-status">${statusBadge(ticket.status)}</div>
    </div>`;
}

/**
 * Render one event group with its header and ticket grid.
 * @param {{ event: object, tickets: object[] }} group
 * @returns {string}
 */
function buildGroupHtml({ event, tickets }) {
  const bannerHtml = event.bannerUrl
    ? `<img src="${escHtml(event.bannerUrl)}" alt="" loading="lazy">`
    : '🎵';

  return `
    <div class="event-group">
      <div class="event-group__header">
        <div class="event-group__banner">${bannerHtml}</div>
        <div class="event-group__info">
          <div class="event-group__name">${escHtml(event.title)}</div>
          <div class="event-group__meta">
            ${event.eventDate ? `<span class="event-group__meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              ${escHtml(fmtDate(event.eventDate))}
            </span>` : ''}
            ${event.venue ? `<span class="event-group__meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              ${escHtml(event.venue)}
            </span>` : ''}
          </div>
        </div>
        <span class="event-group__count">${tickets.length} vé</span>
      </div>
      <div class="tickets-grid">
        ${tickets.map(buildTicketCard).join('')}
      </div>
    </div>`;
}

// ── Load & display tickets ────────────────────────────────────────────
async function loadTickets() {
  try {
    const tickets = await api.get('/api/tickets/my');

    skeletonEl.remove();

    if (!tickets.length) {
      contentEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎫</div>
          <h3 class="empty-title">Chưa có vé nào</h3>
          <p>Bạn chưa đặt vé sự kiện nào. Hãy khám phá các sự kiện đang mở bán!</p>
          <a href="index.html" class="btn btn-primary btn-sm mt-4">Xem sự kiện</a>
        </div>`;
      return;
    }

    const groups = groupByEvent(tickets);
    contentEl.innerHTML = [...groups.values()].map(buildGroupHtml).join('');

    // Attach click / keyboard listeners for each ticket card
    contentEl.querySelectorAll('.ticket-card').forEach(card => {
      const handler = () => {
        const ticketId = card.dataset.ticketId;
        const ticket = tickets.find(t => String(t.id) === ticketId);
        if (ticket) openQrModal(ticket);
      };
      card.addEventListener('click', handler);
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
      });
    });

  } catch (err) {
    skeletonEl.remove();
    contentEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3 class="empty-title">Không tải được danh sách vé</h3>
        <p>${escHtml(err.message)}</p>
        <button class="btn btn-ghost btn-sm mt-4" id="retry-btn">Thử lại</button>
      </div>`;
    document.getElementById('retry-btn')?.addEventListener('click', () => {
      contentEl.innerHTML = '<div id="tickets-skeleton"></div>';
      loadTickets();
    });
    showToast(err.message, 'error');
  }
}

// ── QR modal ──────────────────────────────────────────────────────────

/**
 * Open the QR code modal for the given ticket.
 * @param {object} ticket
 */
function openQrModal(ticket) {
  document.getElementById('qr-event-name').textContent  = ticket.eventTitle ?? '';
  document.getElementById('qr-seat-label').textContent  = `Ghế ${ticket.seatLabel ?? ticket.seatId}`;
  document.getElementById('qr-zone-label').textContent  = ticket.zoneName ? `Khu vực: ${ticket.zoneName}` : '';
  document.getElementById('qr-status-badge').innerHTML  = statusBadge(ticket.status);
  document.getElementById('qr-code-text').textContent   = ticket.qrCode ?? '';

  // qrCode may be a data URL (base64 PNG) or a raw string to display as text
  const img = document.getElementById('qr-image');
  if (ticket.qrCode && ticket.qrCode.startsWith('data:')) {
    img.src = ticket.qrCode;
    img.style.display = 'block';
  } else {
    // Fallback: generate a simple placeholder with the code text
    img.style.display = 'none';
  }

  qrModal.classList.add('visible');
  qrModal.focus();
}

function closeQrModal() {
  qrModal.classList.remove('visible');
}

qrCloseBtn.addEventListener('click', closeQrModal);
qrModal.addEventListener('click', e => {
  if (e.target === qrModal) closeQrModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeQrModal();
});

// ── Toast ─────────────────────────────────────────────────────────────
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toast-container');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `
    <span class="toast-icon" aria-hidden="true">${icons[type] ?? 'ℹ'}</span>
    <span>${escHtml(message)}</span>`;
  container.appendChild(el);
  const dismiss = () => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  };
  setTimeout(dismiss, duration);
  el.addEventListener('click', dismiss);
}

// ── Boot ──────────────────────────────────────────────────────────────
await loadTickets();
</script>

</body>
</html>
