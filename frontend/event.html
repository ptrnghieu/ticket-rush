<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sự kiện — TicketRush</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/seat-map.css">
  <style>
    /* ── Event hero banner ───────────────────────────────────────── */
    .event-hero {
      position: relative;
      width: 100%;
      max-height: 380px;
      overflow: hidden;
      background: var(--bg-elevated);
    }
    .event-hero__img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }
    .event-hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(13,13,16,.92) 100%);
    }
    .event-hero__placeholder {
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-hover));
      color: var(--text-3);
    }

    /* ── Event header ────────────────────────────────────────────── */
    .event-header {
      padding: var(--sp-8) 0 var(--sp-4);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--sp-8);
    }
    .event-status-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-3);
    }
    .event-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text-1);
      margin-bottom: var(--sp-4);
      line-height: 1.15;
    }
    .event-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--sp-4);
    }
    .event-meta-item {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-3);
      color: var(--text-2);
      font-size: var(--text-sm);
    }
    .event-meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      opacity: 0.7;
    }
    .event-meta-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-3);
      margin-bottom: 2px;
    }
    .event-meta-val {
      color: var(--text-1);
      font-weight: 500;
    }
    .event-desc {
      margin-top: var(--sp-4);
      color: var(--text-2);
      font-size: var(--text-sm);
      line-height: 1.7;
      max-width: 720px;
    }

    /* ── Layout: 2 columns on desktop ────────────────────────────── */
    .event-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--sp-8);
      align-items: start;
      padding-bottom: var(--sp-16);
    }
    @media (max-width: 900px) {
      .event-layout { grid-template-columns: 1fr; }
      .event-sidebar { position: static !important; }
    }

    /* ── Section heading ─────────────────────────────────────────── */
    .section-heading {
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--sp-6);
      color: var(--text-1);
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .event-sidebar {
      position: sticky;
      top: 80px;
    }
    .booking-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-6);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .booking-card__title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text-1);
    }
    .booking-card__seats {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }
    .booking-seat-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      color: var(--text-2);
    }
    .booking-seat-row .price {
      color: var(--accent);
      font-weight: 600;
    }
    .booking-divider {
      border: none;
      border-top: 1px solid var(--border);
    }
    .booking-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .booking-total__label {
      font-size: var(--text-sm);
      color: var(--text-2);
    }
    .booking-total__amount {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--accent);
    }
    .booking-hint {
      font-size: var(--text-xs);
      color: var(--text-3);
      text-align: center;
    }
    .booking-empty {
      text-align: center;
      padding: var(--sp-4) 0;
      color: var(--text-3);
      font-size: var(--text-sm);
    }

    /* ── Max-seats warning ───────────────────────────────────────── */
    .max-warning {
      display: none;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--accent);
      margin-top: var(--sp-3);
    }
    .max-warning.visible { display: flex; }

    /* ── Socket connection dot ───────────────────────────────────── */
    .socket-status {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-3);
    }
    .socket-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
    }
    .socket-dot.connected { background: var(--success); }

    /* ── Skeleton for event header ───────────────────────────────── */
    .event-header-skeleton {
      padding: var(--sp-8) 0 var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────────── -->
<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Ticket<span style="color:var(--text-1)">Rush</span></a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Sự kiện</a>
      <div id="nav-auth" style="display:contents"></div>
    </nav>
  </div>
</header>

<!-- ── Event banner ─────────────────────────────────────────────── -->
<div id="event-banner"></div>

<!-- ── Main content ─────────────────────────────────────────────── -->
<div class="container">

  <!-- Event header -->
  <div id="event-header"></div>

  <!-- 2-column layout -->
  <div class="event-layout">

    <!-- Left: Seat map -->
    <section>
      <h2 class="section-heading">Chọn ghế</h2>

      <!-- Seat map legend -->
      <div class="seat-legend" aria-label="Chú thích màu ghế">
        <div class="legend-item">
          <div class="legend-seat legend-seat--available"></div>
          <span>Còn trống</span>
        </div>
        <div class="legend-item">
          <div class="legend-seat legend-seat--selected"></div>
          <span>Đã chọn</span>
        </div>
        <div class="legend-item">
          <div class="legend-seat legend-seat--locked"></div>
          <span>Đang giữ</span>
        </div>
        <div class="legend-item">
          <div class="legend-seat legend-seat--sold"></div>
          <span>Đã bán</span>
        </div>
        <div style="margin-left:auto">
          <span class="socket-status" id="socket-status">
            <span class="socket-dot" id="socket-dot"></span>
            <span id="socket-label">Đang kết nối...</span>
          </span>
        </div>
      </div>

      <!-- Max-seats warning -->
      <div class="max-warning" id="max-warning" role="alert" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Bạn chỉ có thể chọn tối đa 4 ghế.
      </div>

      <!-- Seat map container -->
      <div id="seat-map-container">
        <div class="seat-map-loading" aria-label="Đang tải sơ đồ ghế…"></div>
      </div>
    </section>

    <!-- Right: Booking sidebar -->
    <aside class="event-sidebar">
      <div class="booking-card">
        <p class="booking-card__title">Ghế đã chọn</p>

        <div class="booking-card__seats" id="selected-seats-list">
          <p class="booking-empty">Chưa chọn ghế nào.<br>Nhấp vào ghế trống để chọn.</p>
        </div>

        <hr class="booking-divider">

        <div class="booking-total">
          <span class="booking-total__label">Tổng cộng</span>
          <span class="booking-total__amount" id="total-price">0 ₫</span>
        </div>

        <button
          class="btn btn-primary btn-full btn-lg"
          id="lock-btn"
          disabled
          aria-label="Giữ chỗ và tiếp tục thanh toán"
        >
          Giữ Chỗ
        </button>

        <p class="booking-hint">Ghế sẽ được giữ trong 10 phút sau khi xác nhận.</p>
      </div>
    </aside>

  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ──────────────────────────────────────────────────── -->
<script type="module">
import { api }                                    from './js/api.js';
import { requireAuth, renderNavAuth }             from './js/auth.js';
import { initSeatMap, updateSeatStatus }          from './js/seat-map.js';
import { connectToEvent, onSeatsUpdated,
         onConnect, onDisconnect }                from './js/socket-client.js';

// ── Auth guard ──────────────────────────────────────────────────
renderNavAuth(document.getElementById('nav-auth'));
if (!requireAuth()) throw new Error('redirect');

// ── Read event ID from URL ──────────────────────────────────────
const eventId = new URLSearchParams(window.location.search).get('id');
if (!eventId) {
  showToast('Không tìm thấy ID sự kiện.', 'error');
  setTimeout(() => window.location.replace('index.html'), 1500);
  throw new Error('no eventId');
}

// ── DOM refs ────────────────────────────────────────────────────
const bannerEl      = document.getElementById('event-banner');
const headerEl      = document.getElementById('event-header');
const seatMapEl     = document.getElementById('seat-map-container');
const seatsListEl   = document.getElementById('selected-seats-list');
const totalPriceEl  = document.getElementById('total-price');
const lockBtn       = document.getElementById('lock-btn');
const maxWarning    = document.getElementById('max-warning');
const socketDot     = document.getElementById('socket-dot');
const socketLabel   = document.getElementById('socket-label');

// ── State ───────────────────────────────────────────────────────
let currentEventId  = eventId;
let selectedIds     = [];
let totalPrice      = 0;

// ── Format helpers ──────────────────────────────────────────────
function fmtVND(n) {
  return new Intl.NumberFormat('vi-VN', {
    style: 'currency', currency: 'VND', maximumFractionDigits: 0,
  }).format(n);
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('vi-VN', {
    weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Load event info ─────────────────────────────────────────────
async function loadEvent() {
  headerEl.innerHTML = `
    <div class="event-header-skeleton">
      <div class="skeleton skeleton-line" style="width:120px;height:24px"></div>
      <div class="skeleton skeleton-line-lg" style="height:42px;width:70%"></div>
      <div class="skeleton skeleton-line" style="width:50%"></div>
    </div>`;

  try {
    const { event } = await api.get(`/api/events/${eventId}`);
    document.title = `${event.title} — TicketRush`;
    renderEventHeader(event);
    renderEventBanner(event);
  } catch (err) {
    headerEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>
      <h3 class="empty-title">Không tải được thông tin sự kiện</h3>
      <p>${escHtml(err.message)}</p>
      <a href="index.html" class="btn btn-ghost btn-sm mt-4">Về trang chủ</a></div>`;
    showToast(err.message, 'error');
  }
}

function renderEventBanner(event) {
  if (event.banner_url) {
    bannerEl.innerHTML = `
      <div class="event-hero">
        <img class="event-hero__img" src="${escHtml(event.banner_url)}" alt="${escHtml(event.title)}">
        <div class="event-hero__overlay"></div>
      </div>`;
  } else {
    bannerEl.innerHTML = `
      <div class="event-hero">
        <div class="event-hero__placeholder">🎵</div>
      </div>`;
  }
}

function renderEventHeader(event) {
  const statusMap = {
    on_sale: { label: 'Đang mở bán', cls: 'badge-success badge-dot' },
    ended:   { label: 'Đã kết thúc', cls: 'badge-neutral' },
  };
  const badge = statusMap[event.status] ?? { label: 'Sắp diễn ra', cls: 'badge-info' };

  headerEl.innerHTML = `
    <div class="event-header">
      <div class="event-status-row">
        <span class="badge ${badge.cls}">${badge.label}</span>
      </div>
      <h1 class="event-title">${escHtml(event.title)}</h1>
      <div class="event-meta-grid">
        <div class="event-meta-item">
          <svg class="event-meta-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <div>
            <p class="event-meta-label">Thời gian</p>
            <p class="event-meta-val">${fmtDate(event.event_date)}</p>
          </div>
        </div>
        <div class="event-meta-item">
          <svg class="event-meta-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <div>
            <p class="event-meta-label">Địa điểm</p>
            <p class="event-meta-val">${escHtml(event.venue)}</p>
          </div>
        </div>
        ${event.min_price ? `
        <div class="event-meta-item">
          <svg class="event-meta-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <div>
            <p class="event-meta-label">Giá từ</p>
            <p class="event-meta-val text-accent">${fmtVND(event.min_price)}</p>
          </div>
        </div>` : ''}
      </div>
      ${event.description ? `<p class="event-desc">${escHtml(event.description)}</p>` : ''}
    </div>`;
}

// ── Load seat map ───────────────────────────────────────────────
async function loadSeats() {
  seatMapEl.innerHTML = '<div class="seat-map-loading" aria-label="Đang tải sơ đồ ghế…"></div>';

  try {
    const data = await api.get(`/api/events/${eventId}/seats`);

    if (!data.zones || data.zones.length === 0) {
      seatMapEl.innerHTML = `<div class="empty-state">
        <div class="empty-icon">💺</div>
        <h3 class="empty-title">Chưa có sơ đồ ghế</h3>
        <p>Sơ đồ ghế cho sự kiện này chưa được thiết lập.</p>
      </div>`;
      return;
    }

    initSeatMap(seatMapEl, data, onSelectionChange);
  } catch (err) {
    seatMapEl.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <h3 class="empty-title">Không tải được sơ đồ ghế</h3>
      <p>${escHtml(err.message)}</p>
      <button class="btn btn-ghost btn-sm mt-4" id="retry-seats">Thử lại</button>
    </div>`;
    document.getElementById('retry-seats')?.addEventListener('click', loadSeats);
    showToast(err.message, 'error');
  }
}

// ── Selection change handler ────────────────────────────────────
function onSelectionChange({ selectedIds: ids, totalPrice: price, maxReached }) {
  selectedIds  = ids;
  totalPrice   = price;

  // Max warning
  maxWarning.classList.toggle('visible', maxReached);

  // Update price display
  totalPriceEl.textContent = fmtVND(price);

  // Enable/disable lock button
  lockBtn.disabled = ids.length === 0;

  // Render seat list
  if (ids.length === 0) {
    seatsListEl.innerHTML = '<p class="booking-empty">Chưa chọn ghế nào.<br>Nhấp vào ghế trống để chọn.</p>';
    return;
  }

  // We need seat info to display labels — import seatData indirectly via the module
  // Re-query DOM for seat elements to get their labels
  const rows = ids.map(id => {
    const el = document.querySelector(`.seat[data-id="${id}"]`);
    const label = el?.dataset.label ?? `Ghế ${id}`;
    return `<div class="booking-seat-row">
      <span>${escHtml(label)}</span>
    </div>`;
  }).join('');

  seatsListEl.innerHTML = rows;
}

// ── Seat lock ───────────────────────────────────────────────────
lockBtn.addEventListener('click', async () => {
  if (selectedIds.length === 0) return;

  lockBtn.classList.add('btn-loading');
  lockBtn.disabled = true;

  try {
    const result = await api.post('/api/bookings/lock', {
      eventId: Number(eventId),
      seatIds: selectedIds,
    });

    // Redirect to checkout
    window.location.replace(`checkout.html?bookingId=${result.bookingId}`);
  } catch (err) {
    showToast(err.message || 'Không thể giữ ghế. Vui lòng thử lại.', 'error');

    // Some seats may have been taken by a race — reload the map
    await loadSeats();
  } finally {
    lockBtn.classList.remove('btn-loading');
    lockBtn.disabled = selectedIds.length === 0;
  }
});

// ── WebSocket ───────────────────────────────────────────────────
onConnect(() => {
  socketDot.classList.add('connected');
  socketLabel.textContent = 'Đang kết nối';
});

onDisconnect(() => {
  socketDot.classList.remove('connected');
  socketLabel.textContent = 'Mất kết nối';
});

onSeatsUpdated((seatIds, status) => {
  seatIds.forEach(id => updateSeatStatus(id, status));
});

connectToEvent(eventId);

// ── Boot ────────────────────────────────────────────────────────
await Promise.all([loadEvent(), loadSeats()]);

// ── Toast helper ───────────────────────────────────────────────
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toast-container');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `
    <span class="toast-icon" aria-hidden="true">${icons[type] ?? 'ℹ'}</span>
    <span>${escHtml(message)}</span>`;
  container.appendChild(el);
  const dismiss = () => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  };
  setTimeout(dismiss, duration);
  el.addEventListener('click', dismiss);
}
</script>

</body>
</html>
