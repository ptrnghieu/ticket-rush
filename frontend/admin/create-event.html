<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo sự kiện — Admin TicketRush</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* ── Zone builder ─────────────────────────────────────────── */
    .zones-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      margin-bottom: var(--sp-4);
    }
    .zone-row-builder {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-4);
      position: relative;
    }
    .zone-row-builder__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .zone-row-builder__title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--accent);
    }
    .zone-remove-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--error-dim);
      border: 1px solid rgba(239,68,68,.25);
      color: var(--error);
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--t);
      flex-shrink: 0;
    }
    .zone-remove-btn:hover {
      background: var(--error);
      color: #fff;
    }
    .zone-fields {
      display: grid;
      grid-template-columns: 1fr 80px 80px 1fr;
      gap: var(--sp-3);
      align-items: end;
    }
    .zone-seat-preview {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-2);
      padding: var(--sp-2) var(--sp-3);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .zone-seat-preview strong { color: var(--accent); }

    /* color picker wrapper */
    .color-wrap {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .color-wrap input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      padding: 2px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
    }
    .color-label {
      font-size: var(--text-xs);
      color: var(--text-2);
    }

    /* ── Add zone button ──────────────────────────────────────── */
    .add-zone-btn {
      width: 100%;
      padding: var(--sp-3);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-3);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
    }
    .add-zone-btn:hover {
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Preview section ─────────────────────────────────────── */
    .preview-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-6);
      max-width: 760px;
      margin-top: var(--sp-6);
    }
    .preview-card__title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: var(--sp-4);
    }
    .preview-zones {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-3);
    }
    .preview-zone-pill {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-4);
      border-radius: 100px;
      border: 1px solid var(--border);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg-elevated);
    }
    .preview-zone-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .preview-zone-count {
      color: var(--text-3);
      font-size: var(--text-xs);
    }

    @media (max-width: 640px) {
      .zone-fields { grid-template-columns: 1fr 1fr; }
      .zone-seat-preview { grid-column: 1 / -1; }
    }
    @media (max-width: 420px) {
      .zone-fields { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────────────── -->
<header class="nav">
  <div class="container nav-inner">
    <a href="../index.html" class="nav-logo">Ticket<span style="color:var(--text-1)">Rush</span></a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="events.html" class="nav-link">Sự kiện</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="../index.html" class="nav-link">Trang chủ</a>
      <div id="nav-auth" style="display:contents"></div>
    </nav>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────── -->
<main class="admin-page">
  <div class="container">

    <!-- Page header -->
    <div class="admin-header">
      <div>
        <h1 class="admin-title">Tạo sự kiện mới</h1>
        <p class="admin-sub">Điền thông tin và cấu hình khu vực ghế.</p>
      </div>
      <a href="events.html" class="btn btn-ghost btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Quay lại
      </a>
    </div>

    <!-- Event info form -->
    <div class="admin-form-card">
      <h2 class="admin-form-card__title">
        <span class="admin-form-card__title-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        Thông tin sự kiện
      </h2>

      <div class="form-grid">
        <!-- Title -->
        <div class="field full">
          <label class="label" for="event-title">Tên sự kiện <span style="color:var(--error)">*</span></label>
          <input type="text" id="event-title" class="input" placeholder="VD: Đêm nhạc Trịnh Công Sơn"
                 maxlength="255" autocomplete="off" required>
          <span class="field-error" id="err-title" aria-live="polite"></span>
        </div>

        <!-- Venue -->
        <div class="field">
          <label class="label" for="event-venue">Địa điểm <span style="color:var(--error)">*</span></label>
          <input type="text" id="event-venue" class="input" placeholder="VD: Nhà hát Hòa Bình"
                 maxlength="255" autocomplete="off" required>
          <span class="field-error" id="err-venue" aria-live="polite"></span>
        </div>

        <!-- Date -->
        <div class="field">
          <label class="label" for="event-date">Ngày &amp; giờ sự kiện <span style="color:var(--error)">*</span></label>
          <input type="datetime-local" id="event-date" class="input" required>
          <span class="field-error" id="err-date" aria-live="polite"></span>
        </div>

        <!-- Banner URL -->
        <div class="field full">
          <label class="label" for="event-banner">URL ảnh banner</label>
          <input type="url" id="event-banner" class="input"
                 placeholder="https://..." autocomplete="off">
          <span class="field-error" id="err-banner" aria-live="polite"></span>
        </div>

        <!-- Description -->
        <div class="field full">
          <label class="label" for="event-desc">Mô tả</label>
          <textarea id="event-desc" class="input" rows="4"
                    placeholder="Mô tả chi tiết về sự kiện..." style="resize:vertical"></textarea>
        </div>

        <!-- Status -->
        <div class="field">
          <label class="label" for="event-status">Trạng thái ban đầu</label>
          <select id="event-status" class="input select">
            <option value="draft">Nháp</option>
            <option value="on_sale">Đang mở bán</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Zones builder -->
    <div class="admin-form-card" style="margin-top:var(--sp-6)">
      <h2 class="admin-form-card__title">
        <span class="admin-form-card__title-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </span>
        Cấu hình khu vực ghế
      </h2>

      <span class="field-error" id="err-zones" aria-live="polite" style="margin-bottom:var(--sp-3);display:block"></span>

      <div class="zones-list" id="zones-list">
        <!-- Zone rows injected by JS -->
      </div>

      <button type="button" class="add-zone-btn" id="add-zone-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Thêm khu vực
      </button>
    </div>

    <!-- Zone preview -->
    <div class="preview-card" id="preview-card" style="display:none">
      <div class="preview-card__title">Xem trước cấu hình ghế</div>
      <div class="preview-zones" id="preview-zones"></div>
    </div>

    <!-- Submit row -->
    <div style="max-width:760px;margin-top:var(--sp-6);display:flex;gap:var(--sp-3);align-items:center">
      <button type="button" class="btn btn-primary btn-lg" id="submit-btn">
        Tạo sự kiện
      </button>
      <a href="events.html" class="btn btn-ghost btn-lg">Huỷ</a>
      <span class="field-error" id="err-global" aria-live="polite" style="margin-left:auto"></span>
    </div>

  </div>
</main>

<!-- ── Footer ──────────────────────────────────────────────────────── -->
<footer class="footer">
  <div class="container footer-inner">
    <span class="footer-logo">TicketRush</span>
    <span class="footer-copy">© 2026 TicketRush · INT3306 Spring 2026</span>
  </div>
</footer>

<!-- ── Toast ────────────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ──────────────────────────────────────────────────────── -->
<script type="module">
import { api }                          from '../js/api.js';
import { requireAdmin, renderNavAuth }  from '../js/auth.js';

// ── Auth guard ──────────────────────────────────────────────────────
renderNavAuth(document.getElementById('nav-auth'));
if (!requireAdmin()) throw new Error('redirect');

// ── DOM refs ────────────────────────────────────────────────────────
const zonesList    = document.getElementById('zones-list');
const addZoneBtn   = document.getElementById('add-zone-btn');
const previewCard  = document.getElementById('preview-card');
const previewZones = document.getElementById('preview-zones');
const submitBtn    = document.getElementById('submit-btn');

// ── Zone counter (for unique IDs) ────────────────────────────────────
let zoneSeq = 0;

// ── Accent colours pool for new zones ───────────────────────────────
const ZONE_COLORS = ['#f59e0b', '#3b82f6', '#22c55e', '#a855f7', '#ef4444', '#06b6d4', '#f97316'];

// ── Helpers ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function setError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
  return Boolean(msg);
}
function clearErrors() {
  ['err-title','err-venue','err-date','err-banner','err-zones','err-global']
    .forEach(id => setError(id, ''));
  document.querySelectorAll('.zone-err').forEach(el => { el.textContent = ''; });
}

// ── Zone row builder ──────────────────────────────────────────────────

/**
 * Create and insert a new zone row into the builder.
 */
function addZoneRow() {
  const idx   = zoneSeq++;
  const color = ZONE_COLORS[idx % ZONE_COLORS.length];
  const row   = document.createElement('div');
  row.className = 'zone-row-builder';
  row.dataset.zoneIdx = idx;

  row.innerHTML = `
    <div class="zone-row-builder__header">
      <span class="zone-row-builder__title">Khu vực ${idx + 1}</span>
      <button type="button" class="zone-remove-btn" aria-label="Xoá khu vực ${idx + 1}" title="Xoá khu vực">✕</button>
    </div>
    <div class="zone-fields">
      <!-- Name -->
      <div class="field">
        <label class="label" for="zone-name-${idx}">Tên khu vực</label>
        <input type="text" id="zone-name-${idx}" class="input zone-name"
               placeholder="VD: Khu A, VIP, SVIP..." maxlength="100">
      </div>
      <!-- Rows -->
      <div class="field">
        <label class="label" for="zone-rows-${idx}">Số hàng</label>
        <input type="number" id="zone-rows-${idx}" class="input zone-rows"
               min="1" max="50" value="5" step="1">
      </div>
      <!-- Cols -->
      <div class="field">
        <label class="label" for="zone-cols-${idx}">Số ghế/hàng</label>
        <input type="number" id="zone-cols-${idx}" class="input zone-cols"
               min="1" max="100" value="10" step="1">
      </div>
      <!-- Price -->
      <div class="field">
        <label class="label" for="zone-price-${idx}">Giá vé (VND)</label>
        <input type="number" id="zone-price-${idx}" class="input zone-price"
               min="0" step="1000" value="150000" placeholder="0">
      </div>
      <!-- Color -->
      <div class="field">
        <label class="label">Màu khu vực</label>
        <div class="color-wrap">
          <input type="color" class="zone-color" value="${color}" aria-label="Chọn màu khu vực">
          <span class="color-label">Nhận dạng trên sơ đồ</span>
        </div>
      </div>
      <!-- Seat count preview -->
      <div class="zone-seat-preview">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Tổng: <strong class="zone-total-count">50</strong> ghế (5 hàng × 10 ghế)
      </div>
      <span class="field-error zone-err" aria-live="polite"></span>
    </div>`;

  // Remove button
  row.querySelector('.zone-remove-btn').addEventListener('click', () => {
    row.remove();
    renumberZones();
    updatePreview();
  });

  // Live seat-count update
  const rowsInput = row.querySelector('.zone-rows');
  const colsInput = row.querySelector('.zone-cols');
  const totalEl   = row.querySelector('.zone-total-count');
  const previewEl = row.querySelector('.zone-seat-preview');

  function updateSeatCount() {
    const r = Math.max(1, parseInt(rowsInput.value, 10) || 1);
    const c = Math.max(1, parseInt(colsInput.value, 10) || 1);
    const t = r * c;
    totalEl.textContent = t;
    previewEl.lastChild.textContent = ` ghế (${r} hàng × ${c} ghế)`;
    updatePreview();
  }

  rowsInput.addEventListener('input', updateSeatCount);
  colsInput.addEventListener('input', updateSeatCount);
  row.querySelector('.zone-name').addEventListener('input', updatePreview);
  row.querySelector('.zone-color').addEventListener('input', updatePreview);
  row.querySelector('.zone-price').addEventListener('input', updatePreview);

  zonesList.appendChild(row);
  updatePreview();
}

/**
 * Re-number zone headings after a removal.
 */
function renumberZones() {
  zonesList.querySelectorAll('.zone-row-builder__title').forEach((el, i) => {
    el.textContent = `Khu vực ${i + 1}`;
  });
}

// ── Preview pane ──────────────────────────────────────────────────────
function updatePreview() {
  const rows = [...zonesList.querySelectorAll('.zone-row-builder')];

  if (!rows.length) {
    previewCard.style.display = 'none';
    return;
  }

  previewCard.style.display = 'block';
  previewZones.innerHTML = rows.map(row => {
    const name  = row.querySelector('.zone-name').value.trim()  || '(chưa đặt tên)';
    const r     = parseInt(row.querySelector('.zone-rows').value, 10) || 1;
    const c     = parseInt(row.querySelector('.zone-cols').value, 10) || 1;
    const color = row.querySelector('.zone-color').value;
    const price = parseInt(row.querySelector('.zone-price').value, 10) || 0;
    const total = r * c;
    const fmtPrice = price
      ? new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(price)
      : 'Miễn phí';
    return `
      <div class="preview-zone-pill">
        <span class="preview-zone-dot" style="background:${escHtml(color)}"></span>
        <span>${escHtml(name)}</span>
        <span class="preview-zone-count">${total} ghế · ${escHtml(fmtPrice)}</span>
      </div>`;
  }).join('');
}

// ── Collect & validate form data ──────────────────────────────────────

/**
 * Read the form and zone rows into a payload object.
 * Returns null if validation fails.
 * @returns {{ title, description, banner_url, venue, event_date, status, zones }|null}
 */
function collectPayload() {
  clearErrors();
  let valid = true;

  const title    = document.getElementById('event-title').value.trim();
  const venue    = document.getElementById('event-venue').value.trim();
  const dateVal  = document.getElementById('event-date').value;
  const bannerUrl = document.getElementById('event-banner').value.trim();
  const desc     = document.getElementById('event-desc').value.trim();
  const status   = document.getElementById('event-status').value;

  if (!title)   { setError('err-title',  'Tên sự kiện không được để trống.'); valid = false; }
  if (!venue)   { setError('err-venue',  'Địa điểm không được để trống.');    valid = false; }
  if (!dateVal) { setError('err-date',   'Vui lòng chọn ngày giờ sự kiện.');  valid = false; }

  if (bannerUrl && !isValidUrl(bannerUrl)) {
    setError('err-banner', 'URL ảnh không hợp lệ.'); valid = false;
  }

  const zoneRows = [...zonesList.querySelectorAll('.zone-row-builder')];
  if (!zoneRows.length) {
    setError('err-zones', 'Phải có ít nhất một khu vực ghế.'); valid = false;
  }

  const zones = zoneRows.map((row, i) => {
    const name  = row.querySelector('.zone-name').value.trim();
    const rows  = parseInt(row.querySelector('.zone-rows').value, 10);
    const cols  = parseInt(row.querySelector('.zone-cols').value, 10);
    const price = parseInt(row.querySelector('.zone-price').value, 10) || 0;
    const color = row.querySelector('.zone-color').value;
    const errEl = row.querySelector('.zone-err');

    if (!name) {
      errEl.textContent = 'Tên khu vực không được để trống.'; valid = false;
    } else if (isNaN(rows) || rows < 1 || rows > 50) {
      errEl.textContent = 'Số hàng phải từ 1 đến 50.'; valid = false;
    } else if (isNaN(cols) || cols < 1 || cols > 100) {
      errEl.textContent = 'Số ghế/hàng phải từ 1 đến 100.'; valid = false;
    } else if (price < 0) {
      errEl.textContent = 'Giá vé không được âm.'; valid = false;
    }

    return { name, rows, cols, price, color };
  });

  if (!valid) return null;

  return {
    title,
    description: desc || null,
    banner_url:  bannerUrl || null,
    venue,
    event_date:  new Date(dateVal).toISOString(),
    status,
    zones,
  };
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

// ── Submit ────────────────────────────────────────────────────────────
submitBtn.addEventListener('click', async () => {
  const payload = collectPayload();
  if (!payload) return;

  submitBtn.classList.add('btn-loading');
  submitBtn.disabled = true;

  try {
    await api.post('/api/admin/events', payload);
    showToast('Sự kiện đã được tạo thành công!', 'success');
    setTimeout(() => window.location.replace('events.html'), 800);
  } catch (err) {
    setError('err-global', err.message || 'Tạo sự kiện thất bại. Vui lòng thử lại.');
    showToast(err.message || 'Tạo sự kiện thất bại.', 'error');
    submitBtn.classList.remove('btn-loading');
    submitBtn.disabled = false;
  }
});

// ── Add zone button ───────────────────────────────────────────────────
addZoneBtn.addEventListener('click', addZoneRow);

// ── Toast ─────────────────────────────────────────────────────────────
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toast-container');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `
    <span class="toast-icon" aria-hidden="true">${icons[type] ?? 'ℹ'}</span>
    <span>${escHtml(message)}</span>`;
  container.appendChild(el);
  const dismiss = () => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  };
  setTimeout(dismiss, duration);
  el.addEventListener('click', dismiss);
}

// ── Boot: start with one default zone ───────────────────────────────
addZoneRow();
</script>

</body>
</html>
