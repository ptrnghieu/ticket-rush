<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketRush — Mua vé sự kiện</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Page-specific overrides */
    .event-card__soldout-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 13, 16, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .event-card__banner { position: relative; }
  </style>
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────── -->
<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Ticket<span style="color:var(--text-1)">Rush</span></a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Sự kiện</a>
      <div id="nav-auth" style="display:contents"></div>
    </nav>
  </div>
</header>

<!-- ── Hero ───────────────────────────────────────────────────── -->
<section class="hero">
  <div class="container hero-content">
    <p class="hero-eyebrow">🎫 TicketRush</p>
    <h1 class="hero-title">Khám phá &amp;<br>Đặt vé sự kiện</h1>
    <p class="hero-sub">Mua vé nhanh, đặt chỗ dễ dàng. Hàng trăm sự kiện âm nhạc và giải trí.</p>
  </div>
</section>

<!-- ── Events section ─────────────────────────────────────────── -->
<main class="events-section">
  <div class="container">

    <!-- Controls: search + filters -->
    <div class="events-controls">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="search"
          id="search-input"
          class="input"
          placeholder="Tìm kiếm sự kiện..."
          autocomplete="off"
          aria-label="Tìm kiếm sự kiện"
        >
      </div>

      <div class="filter-tabs" role="tablist" aria-label="Lọc theo trạng thái">
        <button class="filter-tab active" role="tab" aria-selected="true"  data-status="">Tất cả</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-status="on_sale">Đang mở bán</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-status="ended">Đã kết thúc</button>
      </div>
    </div>

    <!-- Result count -->
    <div class="events-header">
      <span class="events-count" id="events-count" aria-live="polite"></span>
    </div>

    <!-- Grid -->
    <div class="events-grid" id="events-grid" aria-label="Danh sách sự kiện">
      <!-- Populated by JS -->
    </div>

  </div>
</main>

<!-- ── Footer ──────────────────────────────────────────────────── -->
<footer class="footer">
  <div class="container footer-inner">
    <span class="footer-logo">TicketRush</span>
    <span class="footer-copy">© 2026 TicketRush · INT3306 Spring 2026</span>
  </div>
</footer>

<!-- ── Toast container ─────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ─────────────────────────────────────────────────── -->
<script type="module">
import { api }           from './js/api.js';
import { renderNavAuth } from './js/auth.js';

// ── Constants ──────────────────────────────────────────────────
const DEBOUNCE_MS = 300;

// ── DOM refs ───────────────────────────────────────────────────
const grid       = document.getElementById('events-grid');
const countEl    = document.getElementById('events-count');
const searchEl   = document.getElementById('search-input');
const filterBtns = document.querySelectorAll('.filter-tab');

// ── State ──────────────────────────────────────────────────────
let currentStatus = '';
let currentSearch = '';
let debounceTimer = null;

// ── Initialise nav ─────────────────────────────────────────────
renderNavAuth(document.getElementById('nav-auth'));

// ── Render skeleton placeholders ───────────────────────────────
function renderSkeletons(count = 8) {
  grid.innerHTML = Array.from({ length: count }, () => `
    <div class="skeleton-card" aria-hidden="true">
      <div class="skeleton skeleton-banner"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line-lg"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line-sm"></div>
        <div style="height:var(--sp-2)"></div>
        <div class="skeleton skeleton-line-xs"></div>
      </div>
    </div>
  `).join('');
}

// ── Format helpers ─────────────────────────────────────────────

/**
 * Format a price number as Vietnamese currency.
 * @param {number} price
 * @returns {string}
 */
function formatPrice(price) {
  if (!price || price === 0) return 'Miễn phí';
  return new Intl.NumberFormat('vi-VN', {
    style: 'currency',
    currency: 'VND',
    maximumFractionDigits: 0,
  }).format(price);
}

/**
 * Format ISO date string to localised Vietnamese display.
 * @param {string} iso
 * @returns {string}
 */
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('vi-VN', {
    weekday: 'short',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
  });
}

/**
 * Derive display status badge for an event.
 * @param {{ status: string, total_seats: number }} event
 * @returns {{ label: string, cls: string }}
 */
function getStatusBadge(event) {
  if (event.status === 'on_sale') {
    return { label: 'Đang mở bán', cls: 'badge-success badge-dot' };
  }
  if (event.status === 'ended') {
    return { label: 'Đã kết thúc', cls: 'badge-neutral' };
  }
  return { label: 'Sắp diễn ra', cls: 'badge-info' };
}

// ── Render event cards ─────────────────────────────────────────

/**
 * Build HTML for a single event card.
 * @param {object} event - Row from GET /api/events
 * @returns {string} HTML string
 */
function buildCardHtml(event) {
  const badge = getStatusBadge(event);
  const price = Number(event.min_price) || 0;
  const isSoldOut = event.status === 'ended';
  const canBook = event.status === 'on_sale';

  const bannerHtml = event.banner_url
    ? `<img class="event-card__img" src="${event.banner_url}" alt="${escapeAttr(event.title)}" loading="lazy">`
    : `<div class="event-card__placeholder">🎵</div>`;

  const soldOutOverlay = isSoldOut
    ? `<div class="event-card__soldout-overlay">
         <span class="badge badge-error" style="font-size:0.875rem;padding:.4rem 1rem">ĐÃ KẾT THÚC</span>
       </div>`
    : '';

  return `
    <a class="card event-card" href="event.html?id=${event.id}" aria-label="${escapeAttr(event.title)}">
      <div class="event-card__banner">
        ${bannerHtml}
        ${soldOutOverlay}
      </div>
      <div class="event-card__body">
        <div class="event-card__top">
          <h2 class="event-card__title">${escapeHtml(event.title)}</h2>
          <span class="badge ${badge.cls}" style="flex-shrink:0">${badge.label}</span>
        </div>
        <div class="event-card__meta">
          <div class="event-card__meta-row">
            <svg class="event-card__meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>${formatDate(event.event_date)}</span>
          </div>
          <div class="event-card__meta-row">
            <svg class="event-card__meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>${escapeHtml(event.venue)}</span>
          </div>
        </div>
        <div class="event-card__footer">
          <div class="event-card__price">
            <span class="event-card__price-from">Giá từ</span>
            ${price > 0
              ? `<span class="event-card__price-amount">${formatPrice(price)}</span>`
              : `<span class="event-card__price-free">Miễn phí</span>`
            }
          </div>
          ${canBook
            ? `<span class="btn btn-primary btn-sm" aria-hidden="true">Đặt vé</span>`
            : `<span class="btn btn-ghost btn-sm" style="opacity:.5" aria-hidden="true">Chi tiết</span>`
          }
        </div>
      </div>
    </a>
  `;
}

/**
 * Render an empty-state message inside the grid.
 * @param {string} message
 */
function renderEmpty(message) {
  grid.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3 class="empty-title">Không tìm thấy sự kiện</h3>
      <p>${escapeHtml(message)}</p>
    </div>
  `;
}

// ── Fetch & render ─────────────────────────────────────────────

/**
 * Fetch events from the API with current filters and update the DOM.
 */
async function loadEvents() {
  renderSkeletons(8);
  countEl.textContent = '';

  const params = new URLSearchParams();
  if (currentStatus) params.set('status', currentStatus);
  if (currentSearch) params.set('search', currentSearch);

  const query = params.toString() ? `?${params}` : '';

  try {
    const events = await api.get(`/api/events${query}`);

    if (!events.length) {
      renderEmpty(
        currentSearch
          ? `Không có sự kiện nào khớp với "${currentSearch}".`
          : 'Hiện chưa có sự kiện nào.'
      );
      countEl.textContent = '0 sự kiện';
      return;
    }

    grid.innerHTML = events.map(buildCardHtml).join('');
    countEl.textContent = `${events.length} sự kiện`;
  } catch (err) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3 class="empty-title">Không thể tải sự kiện</h3>
        <p>${escapeHtml(err.message)}</p>
        <button class="btn btn-ghost btn-sm mt-4" id="retry-btn">Thử lại</button>
      </div>
    `;
    document.getElementById('retry-btn')?.addEventListener('click', loadEvents);
    showToast(err.message, 'error');
  }
}

// ── Event handlers ─────────────────────────────────────────────

// Debounced search
searchEl.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    currentSearch = searchEl.value.trim();
    loadEvents();
  }, DEBOUNCE_MS);
});

// Filter tabs
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    currentStatus = btn.dataset.status;
    loadEvents();
  });
});

// ── Toast helper ───────────────────────────────────────────────

/**
 * Show a temporary notification toast.
 * @param {string} message
 * @param {'success'|'error'|'info'} type
 * @param {number} duration - ms before auto-dismiss
 */
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toast-container');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `
    <span class="toast-icon" aria-hidden="true">${icons[type] ?? 'ℹ'}</span>
    <span>${escapeHtml(message)}</span>
  `;
  container.appendChild(el);

  const dismiss = () => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  };
  setTimeout(dismiss, duration);
  el.addEventListener('click', dismiss);
}

// ── XSS helpers ────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function escapeAttr(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;');
}

// ── Boot ───────────────────────────────────────────────────────
loadEvents();
</script>

</body>
</html>
